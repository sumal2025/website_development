<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | The Creator Current</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container nav">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="The Creator Current Logo">
            </a>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </header>

    <main>
        <section class="page-header">
            <div class="container reveal">
                <h1>Connect.</h1>
                <p>Let's build something together.</p>
            </div>
        </section>

        <section>
            <div class="container" style="max-width: 600px;">
                <form id="contactForm" class="reveal">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" class="form-control" required placeholder="Enter your name">
                        <span class="error-message">Please enter your name</span>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" class="form-control" required placeholder="Enter your email">
                        <span class="error-message">Please enter a valid email address</span>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" class="form-control" required placeholder="Tell us about your project"></textarea>
                        <span class="error-message">Please enter a message</span>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                </form>

                <div class="reveal reveal-delay-2 text-center" style="margin-top: 4rem;">
                    <p style="color: var(--text-muted); margin-bottom: 1rem;">Or reach out directly:</p>
                    <a href="mailto:hello@creatorcurrent.io" style="font-size: 1.5rem; font-weight: 500;">hello@creatorcurrent.io</a>
                    <div style="margin-top: 2rem; display: flex; gap: 2rem; justify-content: center;">
                        <a href="#" class="text-muted">Instagram</a>
                        <a href="#" class="text-muted">LinkedIn</a>
                        <a href="#" class="text-muted">TikTok</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container text-center">
            <p style="color: var(--text-muted); font-size: 0.9rem;">&copy; 2024 The Creator Current.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
