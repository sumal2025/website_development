<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | The Creator Current</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container nav">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="The Creator Current Logo">
            </a>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="portfolio.html" class="active">Portfolio</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </header>

    <main>
        <section class="page-header">
            <div class="container reveal">
                <h1>Work.</h1>
                <p>A simple showcase of our recent creative projects.</p>
            </div>
        </section>

        <section>
            <div class="container">
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem;">
                    <!-- Simple Grid Items -->
                    <div class="reveal portfolio-item" style="aspect-ratio: 1/1; overflow: hidden; border-radius: 4px; background: #1a1a1a; cursor: pointer;">
                        <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&q=80&w=800" alt="Fashion Content" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="reveal reveal-delay-1 portfolio-item" style="aspect-ratio: 1/1; overflow: hidden; border-radius: 4px; background: #1a1a1a; cursor: pointer;">
                        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&q=80&w=800" alt="Product Photography" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="reveal reveal-delay-2 portfolio-item" style="aspect-ratio: 1/1; overflow: hidden; border-radius: 4px; background: #1a1a1a; cursor: pointer;">
                        <img src="https://images.unsplash.com/photo-1529139513075-1231282c65cc?auto=format&fit=crop&q=80&w=800" alt="Model Portrait" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="reveal portfolio-item" style="aspect-ratio: 1/1; overflow: hidden; border-radius: 4px; background: #1a1a1a; cursor: pointer;">
                        <img src="https://images.unsplash.com/photo-1481349518771-20055b2a7b24?auto=format&fit=crop&q=80&w=800" alt="Street Style" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="reveal reveal-delay-1 portfolio-item" style="aspect-ratio: 1/1; overflow: hidden; border-radius: 4px; background: #1a1a1a; cursor: pointer;">
                        <img src="https://images.unsplash.com/photo-1534452203293-494d7ddbf7e0?auto=format&fit=crop&q=80&w=800" alt="Creative Flatlay" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="reveal reveal-delay-2 portfolio-item" style="aspect-ratio: 1/1; overflow: hidden; border-radius: 4px; background: #1a1a1a; cursor: pointer;">
                        <img src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=800" alt="Studio Setup" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img src="" alt="Full view">
    </div>

    <footer>
        <div class="container text-center">
            <p style="color: var(--text-muted); font-size: 0.9rem;">&copy; 2024 The Creator Current.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
